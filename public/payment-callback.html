<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Payment</title>
</head>

<body>
    <h2>Payment completed ✅</h2>
    <button onclick="openApp()">Open App</button>

    <script>
        const params = new URLSearchParams(window.location.search);

        const orderId = params.get("orderId");
        const token = params.get("token"); // 🔥 مهم
        const status = "success";          // 🔥 اضافه کن

        const deepLink =
            `barkymatches://payment-success?orderId=${orderId}&token=${token}&status=${status}`;

        function openApp() {
            window.location.href = deepLink;
        }

        // auto redirect
        setTimeout(() => {
            window.location.href = deepLink;
        }, 500);
    </script>
</body>

</html>
