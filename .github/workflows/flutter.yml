name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"

      - name: Clean Flutter
        run: flutter clean

      - name: Install dependencies
        run: |
          flutter pub cache repair
          flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test